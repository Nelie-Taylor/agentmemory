name: Watch agentmemory Release and Build Docker

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild current version'
        type: boolean
        default: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Check latest agentmemory release
        id: check
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/rohitg00/agentmemory/releases/latest | jq -r .tag_name)
          MY_LATEST=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name)

          if [ "$LATEST_TAG" = "null" ] || [ -z "$LATEST_TAG" ]; then
            echo "Upstream has no releases, skipping."
            echo "new_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          VERSION="${LATEST_TAG#v}"
          MY_VERSION="${MY_LATEST#v}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$VERSION" != "$MY_VERSION" ]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "new_release=false" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: check-version
    if: needs.check-version.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout upstream agentmemory source
        uses: actions/checkout@v4
        with:
          repository: rohitg00/agentmemory
          ref: ${{ needs.check-version.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Patch viewer port for external access
        run: |
          sed -i 's/openssl ca-certificates tini gosu curl/openssl ca-certificates tini gosu curl socat/' deploy/railway/Dockerfile
          sed -i 's|exec gosu|socat TCP-LISTEN:3114,fork,bind=0.0.0.0 TCP:127.0.0.1:3113 \&\nexec gosu|' deploy/railway/entrypoint.sh

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: deploy/railway
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            AGENTMEMORY_VERSION=${{ needs.check-version.outputs.semver }}
            III_VERSION=0.11.2
            III_SDK_VERSION=0.11.2
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/agentmemory:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/agentmemory:${{ needs.check-version.outputs.version }}

      - name: Delete existing release (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          delete_release: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release to track built version
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: agentmemory ${{ needs.check-version.outputs.version }}
          body: |
            ## Automated Docker Build
            - **Version:** ${{ needs.check-version.outputs.version }}
            - **Trigger:** ${{ github.event_name == 'workflow_dispatch' && 'Manual' || 'Scheduled' }}
            - **Source:** [rohitg00/agentmemory ${{ needs.check-version.outputs.tag }}](https://github.com/rohitg00/agentmemory/releases/tag/${{ needs.check-version.outputs.tag }})
            - **Image:** `${{ secrets.DOCKERHUB_USERNAME }}/agentmemory:${{ needs.check-version.outputs.version }}`
          token: ${{ secrets.GITHUB_TOKEN }}
